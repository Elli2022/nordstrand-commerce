name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nordstrand
          POSTGRES_PASSWORD: nordstrand
          POSTGRES_DB: nordstrand_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nordstrand -d nordstrand_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nordstrand:nordstrand@localhost:5432/nordstrand_test
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace @nordstrand/shared

      - name: Generate Prisma client
        run: npm run db:generate --workspace @nordstrand/api

      - name: Run migrations
        run: npm run db:migrate:deploy --workspace @nordstrand/api

      - name: API tests
        run: npm run test --workspace @nordstrand/api

      - name: Build API
        run: npm run build --workspace @nordstrand/api

      - name: Build web
        run: npm run build --workspace @nordstrand/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
