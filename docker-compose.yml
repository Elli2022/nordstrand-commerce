services:
  postgres:
    image: postgres:16-alpine
    container_name: nordstrand-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nordstrand
      POSTGRES_PASSWORD: nordstrand
      POSTGRES_DB: nordstrand
    volumes:
      - nordstrand_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nordstrand -d nordstrand"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nordstrand_pg_data:
